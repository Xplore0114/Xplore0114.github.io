name: Update Papers Daily

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest papers
        run: python3 scripts/fetch_papers.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.json llm-tracker/papers.json llm-tracker/company-papers.json
          git diff --staged --quiet || git commit -m "chore: update papers $(date +%Y-%m-%d)"
          git push

      - name: Send Feishu notification
        if: env.FEISHU_WEBHOOK != ''
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -f daily_summary.txt ]; then
            MSG=$(cat daily_summary.txt)
            python3 << 'PYEOF'
          import urllib.request, json, os
          webhook = os.environ['FEISHU_WEBHOOK']
          msg = open('daily_summary.txt').read()
          text = '📚 LLM Papers 每日更新\n' + msg + '\n查看：https://xplore0114.github.io/llm-tracker.html'
          data = json.dumps({'msg_type':'text','content':{'text':text}}).encode()
          req = urllib.request.Request(webhook, data=data, headers={'Content-Type':'application/json'})
          res = urllib.request.urlopen(req).read()
          print(res.decode())
          PYEOF
          fi
