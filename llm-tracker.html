<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Papers Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#333}
header{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:white;padding:2rem;text-align:center}
header h1{font-size:2rem;margin-bottom:.5rem}
header p{opacity:.8;font-size:.9rem}
.tabs{display:flex;justify-content:center;gap:1rem;padding:1.2rem;background:white;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.tab{padding:.6rem 1.5rem;border-radius:2rem;cursor:pointer;border:2px solid #302b63;background:white;font-weight:600;transition:all .2s;font-size:.9rem}
.tab.active,.tab:hover{background:#302b63;color:white}
.filter-bar{max-width:960px;margin:1.5rem auto .5rem;padding:0 1rem;display:flex;gap:.8rem;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select{padding:.45rem .7rem;border:1px solid #ddd;border-radius:8px;font-size:.85rem;background:white;outline:none}
.fg input:focus,.fg select:focus{border-color:#302b63}
.fg.grow{flex:1;min-width:180px}
.result-info{max-width:960px;margin:.5rem auto;padding:0 1rem;font-size:.8rem;color:#999}
.section{display:none;max-width:960px;margin:1rem auto 3rem;padding:0 1rem}
.section.active{display:block}
.card{background:white;border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.card-header{display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.badge{font-size:.8rem;padding:.2rem .7rem;border-radius:1rem;font-weight:600}
.badge.cite{background:#fff3e0;color:#e65100}
.badge.cite.high{background:#e8f5e9;color:#2e7d32}
.badge.date{background:#ede7f6;color:#4527a0}
.badge.tag{background:#e3f2fd;color:#1565c0}
.arxiv-link{font-size:.85rem;color:#302b63;text-decoration:none;font-weight:600}
.arxiv-link:hover{text-decoration:underline}
.card h3{font-size:1rem;line-height:1.5;margin-bottom:.4rem}
.authors{font-size:.85rem;color:#666;margin-bottom:.5rem}
.abstract{font-size:.85rem;color:#555;line-height:1.6;border-top:1px solid #f0f0f0;padding-top:.5rem;margin-top:.5rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pagination{display:flex;justify-content:center;gap:.4rem;flex-wrap:wrap;margin-top:1.5rem}
.page-btn{padding:.45rem .9rem;border:1px solid #ddd;border-radius:6px;background:white;cursor:pointer;font-size:.85rem;transition:all .2s}
.page-btn:hover,.page-btn.active{background:#302b63;color:white;border-color:#302b63}
footer{text-align:center;padding:2rem;color:#aaa;font-size:.8rem}
@media(max-width:700px){.filter-bar{flex-direction:column}}
</style>
</head>
<body>
<header>
  <h1>🤖 LLM Papers Tracker</h1>
  <p>AI 大模型论文追踪 · 精选高影响力研究</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('high',this)">高引用 (≥500)</button>
  <button class="tab" onclick="showTab('latest',this)">最新论文</button>
  <button class="tab" onclick="showTab('topics',this)">按主题</button>
</div>

<div class="filter-bar" id="filter-bar">
  <div class="fg grow">
    <label>搜索</label>
    <input type="text" id="q" placeholder="标题、作者、关键词..." autocomplete="off" oninput="applyFilter()">
  </div>
  <div class="fg">
    <label>最低引用</label>
    <select id="min-cite" onchange="applyFilter()">
      <option value="0">全部</option>
      <option value="100">≥ 100</option>
      <option value="500">≥ 500</option>
      <option value="1000">≥ 1000</option>
    </select>
  </div>
  <div class="fg">
    <label>年份</label>
    <select id="year" onchange="applyFilter()">
      <option value="">全部</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
    </select>
  </div>
</div>
<div class="result-info" id="result-info"></div>

<div id="high" class="section active"></div>
<div id="latest" class="section"></div>
<div id="topics" class="section"></div>

<footer>Curated by Kevin · Data from arXiv & Semantic Scholar</footer>

<script>
const PAPERS = [
  {title:"Attention Is All You Need",authors:"Vaswani et al.",year:2017,cite:120000,arxiv:"1706.03762",abstract:"We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely.",tags:["Transformer","Attention"]},
  {title:"BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding",authors:"Devlin et al., Google",year:2018,cite:90000,arxiv:"1810.04805",abstract:"We introduce BERT, a new language representation model which stands for Bidirectional Encoder Representations from Transformers.",tags:["BERT","Pre-training"]},
  {title:"Language Models are Few-Shot Learners (GPT-3)",authors:"Brown et al., OpenAI",year:2020,cite:50000,arxiv:"2005.14165",abstract:"We show that scaling up language models greatly improves task-agnostic, few-shot performance, sometimes even reaching competitiveness with prior state-of-the-art fine-tuning approaches.",tags:["GPT","Few-shot","Scaling"]},
  {title:"Training language models to follow instructions with human feedback (InstructGPT)",authors:"Ouyang et al., OpenAI",year:2022,cite:12000,arxiv:"2203.02155",abstract:"We show an avenue for aligning language models with user intent on a wide range of tasks by fine-tuning with human feedback.",tags:["RLHF","Alignment","InstructGPT"]},
  {title:"LLaMA: Open and Efficient Foundation Language Models",authors:"Touvron et al., Meta AI",year:2023,cite:15000,arxiv:"2302.13971",abstract:"We introduce LLaMA, a collection of foundation language models ranging from 7B to 65B parameters trained on trillions of tokens.",tags:["LLaMA","Open-source","Efficient"]},
  {title:"GPT-4 Technical Report",authors:"OpenAI",year:2023,cite:18000,arxiv:"2303.08774",abstract:"We report the development of GPT-4, a large-scale, multimodal model which can accept image and text inputs and produce text outputs.",tags:["GPT-4","Multimodal"]},
  {title:"Llama 2: Open Foundation and Fine-Tuned Chat Models",authors:"Touvron et al., Meta AI",year:2023,cite:14000,arxiv:"2307.09288",abstract:"We develop and release Llama 2, a collection of pretrained and fine-tuned large language models ranging in scale from 7B to 70B parameters.",tags:["LLaMA2","Chat","Open-source"]},
  {title:"Mistral 7B",authors:"Jiang et al., Mistral AI",year:2023,cite:3000,arxiv:"2310.06825",abstract:"We introduce Mistral 7B, a 7-billion-parameter language model engineered for superior performance and efficiency.",tags:["Mistral","Efficient","7B"]},
  {title:"Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks",authors:"Lewis et al., Facebook AI",year:2020,cite:8000,arxiv:"2005.11401",abstract:"We explore a general-purpose fine-tuning recipe for retrieval-augmented generation (RAG) — models which combine pre-trained parametric and non-parametric memory for language generation.",tags:["RAG","Retrieval","Knowledge"]},
  {title:"Chain-of-Thought Prompting Elicits Reasoning in Large Language Models",authors:"Wei et al., Google",year:2022,cite:9000,arxiv:"2201.11903",abstract:"We explore how generating a chain of thought — a series of intermediate reasoning steps — significantly improves the ability of large language models to perform complex reasoning.",tags:["CoT","Reasoning","Prompting"]},
  {title:"ReAct: Synergizing Reasoning and Acting in Language Models",authors:"Yao et al., Princeton & Google",year:2022,cite:4000,arxiv:"2210.03629",abstract:"We explore the use of LLMs to generate both reasoning traces and task-specific actions in an interleaved manner.",tags:["Agent","Reasoning","Tool-use"]},
  {title:"Toolformer: Language Models Can Teach Themselves to Use Tools",authors:"Schick et al., Meta AI",year:2023,cite:2500,arxiv:"2302.04761",abstract:"We introduce Toolformer, a model trained to decide which APIs to call, when to call them, what arguments to pass, and how to best incorporate the results into future token prediction.",tags:["Tool-use","Agent"]},
  {title:"Qwen2 Technical Report",authors:"Qwen Team, Alibaba",year:2024,cite:1200,arxiv:"2407.10671",abstract:"We introduce Qwen2, the latest series of Qwen large language models. Qwen2 surpasses most prior open-weight models including its predecessor Qwen1.5.",tags:["Qwen2","Open-source","Multilingual"]},
  {title:"DeepSeek-R1: Incentivizing Reasoning Capability in LLMs via Reinforcement Learning",authors:"DeepSeek AI",year:2025,cite:800,arxiv:"2501.12948",abstract:"We introduce DeepSeek-R1, which incentivizes reasoning capabilities in LLMs through reinforcement learning (RL).",tags:["Reasoning","RL","DeepSeek"]},
  {title:"Constitutional AI: Harmlessness from AI Feedback",authors:"Bai et al., Anthropic",year:2022,cite:3500,arxiv:"2212.08073",abstract:"We propose Constitutional AI (CAI), a method for training a harmless AI assistant without any human labels identifying harmful outputs.",tags:["Alignment","Safety","RLHF"]},
];

const PAGE_SIZE = 10;
let currentTab = 'high';
let filteredData = {};

function showTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('q').value.toLowerCase();
  const minCite = parseInt(document.getElementById('min-cite').value);
  const year = document.getElementById('year').value;

  let data = PAPERS.filter(p => {
    if (p.cite < minCite) return false;
    if (year && p.year != year) return false;
    if (q && !p.title.toLowerCase().includes(q) && !p.authors.toLowerCase().includes(q) && !p.tags.join(' ').toLowerCase().includes(q)) return false;
    return true;
  });

  if (currentTab === 'high') data = data.filter(p => p.cite >= 500).sort((a,b) => b.cite - a.cite);
  else if (currentTab === 'latest') data = [...data].sort((a,b) => b.year - a.year);
  else data = [...data].sort((a,b) => b.cite - a.cite);

  filteredData[currentTab] = data;
  renderPage(currentTab, 1);
}

function renderPage(tab, page) {
  const data = filteredData[tab] || [];
  const total = data.length;
  const start = (page-1)*PAGE_SIZE;
  const slice = data.slice(start, start+PAGE_SIZE);
  const container = document.getElementById(tab);

  document.getElementById('result-info').textContent = `共 ${total} 篇`;

  let html = slice.map(p => `
    <div class="card">
      <div class="card-header">
        <span class="badge cite ${p.cite>=1000?'high':''}">📊 ${p.cite.toLocaleString()} 引用</span>
        <span class="badge date">📅 ${p.year}</span>
        <a class="arxiv-link" href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv:${p.arxiv} ↗</a>
      </div>
      <h3>${p.title}</h3>
      <div class="authors">👤 ${p.authors}</div>
      <div style="margin-bottom:.5rem">${p.tags.map(t=>`<span class="badge tag">${t}</span>`).join(' ')}</div>
      <div class="abstract">${p.abstract}</div>
    </div>
  `).join('');

  // pagination
  const totalPages = Math.ceil(total/PAGE_SIZE);
  if (totalPages > 1) {
    html += '<div class="pagination">';
    for (let i=1;i<=totalPages;i++) {
      html += `<button class="page-btn ${i===page?'active':''}" onclick="renderPage('${tab}',${i})">${i}</button>`;
    }
    html += '</div>';
  }

  container.innerHTML = html || '<div style="text-align:center;padding:3rem;color:#999">没有找到相关论文</div>';
}

// topics tab
function renderTopics() {
  const topics = {};
  PAPERS.forEach(p => p.tags.forEach(t => {
    if (!topics[t]) topics[t] = [];
    topics[t].push(p);
  }));
  const container = document.getElementById('topics');
  container.innerHTML = Object.entries(topics).sort((a,b)=>b[1].length-a[1].length).map(([tag, papers]) => `
    <div class="card">
      <div class="card-header"><span class="badge tag">🏷️ ${tag}</span><span class="badge cite">${papers.length} 篇</span></div>
      ${papers.slice(0,3).map(p=>`<div style="font-size:.85rem;padding:.3rem 0;border-bottom:1px solid #f5f5f5"><a class="arxiv-link" href="https://arxiv.org/abs/${p.arxiv}" target="_blank">${p.title}</a></div>`).join('')}
    </div>
  `).join('');
}

applyFilter();
renderTopics();
</script>
</body>
</html>
